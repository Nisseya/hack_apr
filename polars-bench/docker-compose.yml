services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: polars_bench
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polars_bench"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/polars_bench
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BACKEND_TEST_URL: ${BACKEND_TEST_URL:-http://host.docker.internal:8000}
      BACKEND_GLOBAL_URL: ${BACKEND_GLOBAL_URL:-http://host.docker.internal:8000}
      BACKEND_GLOBAL_SECRET: ${BACKEND_GLOBAL_SECRET:-}
    extra_hosts:
      # Allow reaching the local FastAPI backend running on the host
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    command: sh -c "npm run db:migrate && npm run start"

volumes:
  pgdata:
